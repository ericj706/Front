<!DOCTYPE html>
<html lang='en'>
<head>
    <link rel='stylesheet' href='main.css'>
    <!-- CSS 방법2 -->
    <style>
        h4{color: blue;}
    </style>

    <!-- CSS 방법3 -->
    <link rel ="stylesheet"href="exam1.css"/>

</head>
<body>
    <!--
        HTML: 이동가능한 텍스트 마크업 언어                         ex) 뼈대
        JS: 자바스크립트 프로그래밍 언어                            ex) 동적 이벤트(근육?뇌?)
        CSS: Cascading(위에서 아래로) Style(꾸미기) sheet(덮는)    ex) 옷
            ㄴ> 위에서 아래로 (HTML을) 꾸며주는.
    -->
    <!-- CSS 적용하는 방법 1 : 인라인(마크업 내 style 속성을 이용한 꾸미기) -->
    <h3 style="color: rgb(19, 206, 12);"> CSS방법 1 </h3>

    <!-- CSS 적용하는 방법 2 : <head> 마크업내 <style> 마크업 문법 사용 -->
    <h4> CSS방법 2 </h4>
    
    <!-- CSS 적용하는 방법 3 : css 파일내 css 문법 작성하고 <head>마크업에서 파일호출-->
    <h5> CSS방법 3</h5>
    <h6 class="구역1 구역4"> CSS 선택자 </h6>
    <h6 id = "구역2" > CSS 선택자 </h6>

    <div> <!-- 상위요소: body, 하위요소: h3, ol, li -->
        <h3> 학생명단 </h3> <!-- 상위요소: div, 하위요소 x -->
        <ol>               <!-- 상위요소: div, 하위요소 li -->
            <li id="이름1">유재석</li> <!-- 상위요소: ol, 하위요소 x -->
            <li>
                <h3>강호동</h3>
            </li>
        </ol>
    </div>
    
    <h2> CSS 텍스트 주요 속성</h2>
    <h1 class="title"> 강아지 </h1>
    <div class ="본문구역">
        치와와는 멕시코 치와와주의 이름을 따서 붙여진 것으로 알려져 있다. 
        세계에서 체구가 가장 작은 견종이다. 행동이 매우 빠르고 기민하다.
    </div>
    <p class ="작성자"> 위키백과 </p>

    <p class ="별"> </p>

</body>
</html>
