<!DOCTYPE html>
<html lang='en'>
<head>
    <link rel='stylesheet' href='JS_practice9.css'>
</head>
<body>
    <div id="wrap1">
        <div>

        </div>
    </div>



    <div id="wrap2">
        <div id="person1">
            <div class="사원등록">
                <h4> 사원등록 </h4>
                <div class="person2">
                    <div class="box1">
                        <div class="box2">
                            <p>이름</p>
                            <input class="name" placeholder="이름을 작성하세요" />
                        </div>
                        <div class="box2">
                            <p>직급</p>
                            <input class="position" placeholder="현재 직급을 작성하세요" />
                        </div>
                    </div>
                    <div class="box1">
                        <div class="box2">
                            <p>부서</p>
                            <select class="team">
                                <option value="disabled"> 부서를 선택하세요. </option>
                                <option value="1" > 개발팀 </option>
                                <option value="2" > 디자인팀 </option>
                                <option value="3" > 기획팀 </option>
                            </select> 
                        </div>
                        <div class="box2">
                            <p>사진</p>
                            <input class="image" type="file" />
                        </div>
                    </div>
                </div>
                <button class="등록" onclick="personAdd()"> 등록 </button>
            </div>

            <div class="사원목록">
                <h4> 사원 전체 목록 </h4>
                <table class="list">
                    <thead>
                        <tr class="head">
                            <th> 사진 </th> <th> 이름 </th> <th> 부서 </th> 
                            <th> 직급 </th> <th> 관리 </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="list1">
                            <td> <img src="https://placehold.co/100x100"/> </td>
                            <td> 김민준 </td> <td> 개발팀 </td> <td> 선임 개발자 </td>
                            <td>
                                <button class="updateBtn">수정</button> 
                                <button class="deleteBtn">삭제</button>
                            </td>
                        </tr>
                        <tr class="list1">
                            <td> <img src="https://placehold.co/100x100"/> </td>
                            <td> 이서연 </td> <td> 디자인팀 </td> <td> 수석 디자이너 </td>
                            <td>
                                <button class="updateBtn">수정</button> 
                                <button class="deleteBtn">삭제</button>
                            </td>
                        </tr>
                        <tr class="list1">
                            <td> <img src="https://placehold.co/100x100"/> </td>
                            <td> 박도윤 </td> <td> 기획팀 </td> <td> 팀장 </td>
                            <td>
                                <button class="updateBtn">수정</button> 
                                <button class="deleteBtn">삭제</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>




    <div id="wrap3">
        
    </div>

    <script src="JS_practice9.js"></script>
</body>
</html>
